{% extends 'core/base.html' %} {% block content %}

<div class="min-h-screen flex items-center justify-center px-4">
  <div
    class="w-full max-w-md bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl shadow-xl p-8"
  >
    <h1 class="text-3xl font-bold text-white mb-6 text-center">Create Room</h1>

    <form method="post" class="space-y-4">
      {% csrf_token %}

      <input
        type="text"
        name="name"
        placeholder="Enter room name..."
        class="w-full px-4 py-3 rounded-xl bg-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-blue-500"
        required
      />

      <button
        type="submit"
        class="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-xl transition"
      >
        Create Room
      </button>
    </form>

    <div class="text-center mt-5">
      <a
        href="{% url 'rooms' %}"
        class="text-white/60 hover:text-white text-sm"
      >
        ← Back to Rooms
      </a>
    </div>
  </div>
</div>

{% endblock %}
