{% extends 'core/base.html' %} {% block title %}Login | Djangochat{% endblock %}
{% block content %}

<div
  class="flex items-center justify-center min-h-[80vh]bg-gradient-to-br from-slate-900 via-purple-900 to-slate-800 px-4"
>
  <div
    class="w-full max-w-md bg-gradient-to-br from-slate-900 via-purple-900 to-slate-800 -lg border border-white/20 rounded-2xl shadow-2xl p-8"
  >
    <h2 class="text-3xl font-bold text-center text-white mb-2">Welcome Back</h2>

    <p class="text-center text-gray-200 mb-6">Login to your account</p>

    <form method="POST" class="space-y-5">
      {% csrf_token %}

      <div>
        <label class="text-sm text-white">Username</label>
        <input
          type="text"
          name="username"
          placeholder="Enter username"
          class="w-full mt-1 px-4 py-3 rounded-xl bg-white/10 text-white border border-white/20 focus:outline-none focus:ring-2 focus:ring-teal-400"
          required
        />
      </div>

      <div>
        <label class="text-sm text-white">Password</label>
        <input
          type="password"
          name="password"
          placeholder="Enter password"
          class="w-full mt-1 px-4 py-3 rounded-xl bg-white/10 text-white border border-white/20 focus:outline-none focus:ring-2 focus:ring-teal-400"
          required
        />
      </div>

      <button
        type="submit"
        class="w-full py-3 rounded-xl bg-white/20 hover:bg-white/30 text-white font-semibold transition shadow-lg border border-white/20"
      >
        Login
      </button>
    </form>

    <p class="text-center text-gray-200 mt-6 text-sm">
      Don't have an account?
      <a href="/signup/" class="text-white font-semibold hover:underline">
        Sign up
      </a>
    </p>
  </div>
</div>

{% endblock %}
