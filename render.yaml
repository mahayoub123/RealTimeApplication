services:
  - type: web
    name: djangochat
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn djangochat.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: djangochat-db
          property: connectionString

databases:
  - name: djangochat-db
    plan: free