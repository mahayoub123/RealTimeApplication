{% extends 'core/base.html' %} {% block title %}Signup | My Site{% endblock %}
{% block content %}

<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-purple-900 to-slate-800 px-6"
>
  <div
    class="w-full max-w-md bg-white/10 backdrop-blur-md rounded-2xl p-8 shadow-xl text-white"
  >
    <h2 class="text-3xl font-bold text-center mb-6">Create Account</h2>
    <p class="text-center text-gray-300 mb-8">Join us today</p>

    <form method="POST" class="space-y-5">
      {% csrf_token %}

      <div>
        <label class="block mb-1 text-sm text-gray-300">Username</label>
        <input
          type="text"
          name="username"
          class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:border-purple-400 text-white"
        />
      </div>

      <div>
        <label class="block mb-1 text-sm text-gray-300">Email</label>
        <input
          type="email"
          name="email"
          class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:border-purple-400 text-white"
        />
      </div>

      <div>
        <label class="block mb-1 text-sm text-gray-300">Password</label>
        <input
          type="password"
          name="password1"
          class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:border-purple-400 text-white"
        />
      </div>

      <div>
        <label class="block mb-1 text-sm text-gray-300">Confirm Password</label>
        <input
          type="password"
          name="password2"
          class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 focus:outline-none focus:border-purple-400 text-white"
        />
      </div>

      <button
        type="submit"
        class="w-full py-3 rounded-xl bg-purple-500 hover:bg-purple-600 transition font-semibold"
      >
        Sign Up
      </button>
    </form>

    <p class="text-center text-sm text-gray-300 mt-6">
      Already have an account?
      <a href="/login/" class="text-purple-400 hover:underline">Login</a>
    </p>
  </div>
</div>

{% endblock %}
