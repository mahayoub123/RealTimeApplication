<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{% block title %}Chat with me{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      .messages {
        height: 400px;
        overflow-y: auto;
      }
    </style>
  </head>

  <body
    class="bg-gradient-to-br from-teal-700 via-teal-600 to-teal-800 min-h-screen flex flex-col"
  >
    <nav
      class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-800 flex items-center justify-between px-6 py-4 bg-white/10 backdrop-blur-md border-b border-white/20 shadow-md"
    >
      <div>
        <a
          href="/"
          class="text-2xl font-bold text-white tracking-wide hover:opacity-80 transition"
        >
          Chat with me
        </a>
      </div>

      <div class="flex items-center space-x-4">
        {% if request.user.is_authenticated %}

        <a
          href="/login"
          class="px-5 py-2 rounded-xl text-white bg-gradient-to-br from-slate-900 via-purple-900 to-slate-800 transition shadow"
        >
          Log out
        </a>
        {% else %}
        <a href="/login/" class="text-white hover:text-gray-200 transition"
          >Log in</a
        >

        <a
          href="/signup/"
          class="px-5 py-2 rounded-xl text-white bg-gradient-to-br from-slate-900 via-purple-900 to-slate-800 transition shadow"
        >
          Sign up
        </a>
        {% endif %}
      </div>
    </nav>

    <main
      class="flex-1 bg-gradient-to-br from-slate-900 via-purple-900 to-slate-800"
    >
      {% block content %}{% endblock %}
    </main>

    <footer
      class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-800 text-center text-gray-200 text-sm py-4 opacity-70"
    >
      Developed by Full-stack web developer Eng: Mahmoud Ayoub© 2026 All rights
      reserved.
    </footer>

    {% block scripts %}{% endblock %}
  </body>
</html>
