{% extends 'core/base.html' %} {% block content %}

<div
  class="min-h-[85vh] flex flex-col max-w-4xl mx-auto mt-8 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl shadow-xl"
>
  <div class="p-4 border-b border-white/20 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-white">{{ room.name }}</h1>

    <a
      href="{% url 'rooms' %}"
      class="text-white/60 hover:text-white transition"
    >
      ← Back
    </a>
  </div>

  <div class="flex-1 p-4 overflow-y-auto space-y-3">
    {% for message in messages %}

    <div class="{% if message.user == request.user %}text-right{% endif %}">
      <div
        class="inline-block px-4 py-2 rounded-2xl max-w-xs break-words {% if message.user == request.user %} bg-blue-500 text-white {% else %} bg-white text-gray-800 {% endif %}"
      >
        <p class="text-xs font-semibold opacity-70">
          {{ message.user.username }}
        </p>
        <p class="text-sm">{{ message.content }}</p>
      </div>
    </div>

    {% empty %}

    <p class="text-center text-white/60 mt-10">No messages yet...</p>

    {% endfor %}
  </div>

  <form method="post" class="p-4 border-t border-white/20 flex gap-2">
    {% csrf_token %}

    <input
      type="text"
      name="content"
      placeholder="Type a message..."
      class="flex-1 px-4 py-2 rounded-xl bg-white/20 text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-blue-500"
    />

    <button
      type="submit"
      class="px-6 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-xl transition"
    >
      Send
    </button>
  </form>
</div>

{% endblock %}
